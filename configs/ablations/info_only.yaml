# Ablation: L_info only (no geometry loss)
# Tests whether fidelity alone produces good reconstruction but poor geometry.

experiment:
  name: ablation_info_only

model:
  arch: resnet18
  num_classes: 10
  pretrained: true

  flow_compression:
    grid_size: 4
    flow_dim: 256

  meta_encoder:
    projection_dim: 128
    n_heads: 4
    n_transformer_layers: 2
    dropout: 0.0

  regressor:
    hidden_dim: 64

training:
  epochs: 100
  lr: 1.0e-3
  weight_decay: 1.0e-4
  geometry_temperature: 0.1
  info_loss_weight: 5.0
  lambda_geometry:
    init: 0.0
    final: 0.0           # geometry loss disabled
    warmup_epochs: 0

data:
  data_dir: data/cifar10
  batch_size: 256
  num_workers: 4
  augment: true

discovery:
  min_cluster_fraction: 0.01
  max_cluster_fraction: 0.40
  hdbscan_min_cluster_size: 5

logging:
  checkpoint_dir: experiments/ablations/info_only
  log_interval: 50
  save_every: 10
