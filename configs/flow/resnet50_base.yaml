experiment:
  name: resnet50_base
  mode: base

data:
  data_dir: data/cifar10
  batch_size: 32
  num_workers: 4
  seed: 0
  augment_fit: true
  download: true

backbone:
  arch: resnet50
  pretrained: true
  num_classes: 10
  weights_path: null
  require_trained_checkpoint: true

tokenization:
  grid_size: 4
  token_dim: 128
  flow_dim: 256
  traj_dim: 256
  eps: 1.0e-6

encoder:
  n_heads: 4
  n_transformer_layers: 2
  mlp_dim: 256
  dropout: 0.0

objectives:
  lambda_pred: 1.0
  lambda_rec: 0.2
  lambda_traj_candidates: [0.1, 0.2, 0.5]
  traj_topk: 8
  traj_gamma: 0.2
  traj_tau: 0.1

training:
  lr: 1.0e-3
  weight_decay: 1.0e-4
  grad_clip: 1.0
  phase_epochs:
    phase_a: 24
    phase_b: 24
    phase_c: 0
  baseline_fit_images: 2048
  baseline_eval_images: 2048
  baseline_hidden_dim: 256
  baseline_epochs: 10
  baseline_batch_size: 1024
  baseline_lr: 1.0e-3
  baseline_weight_decay: 1.0e-4
  validation_images: 1024
  test_evaluation_images: null
  alignment_max_pairs: 4096
  confirmatory_bootstrap_iterations: 500

discovery:
  min_cluster_fraction: 0.005
  max_cluster_fraction: 0.40
  min_cluster_size: 20
  bootstrap_iterations: 20
  stability_threshold: 0.60
  merge_threshold: 0.70
  node_threshold: 0.70
  seed: 0
  seeds: [0, 1, 2, 3, 4]
  stability_bootstrap_iterations: 500
  node_shuffle_seed: 101
  max_images: null

interventions:
  alpha: 0.05
  max_images: null

logging:
  checkpoint_dir: experiments/flow/resnet50_base
